name: Bug Report
description: File a bug report
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `romyq ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Paste any relevant terminal output.
      render: text

  - type: input
    id: version
    attributes:
      label: romyq version
      placeholder: output of `romyq version`
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: output of `python --version`
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: dropdown
    id: install_type
    attributes:
      label: How did you install romyq?
      options:
        - pip install romyq
        - pip install -e . (editable)
        - downloaded binary
        - other
    validations:
      required: true
